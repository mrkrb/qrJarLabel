<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <title>Galleria - QR Jar Label</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/gallery.css">
</head>
<body>
    <div id="app">
        <header id="header">
            <a href="index.html" id="btn-back" aria-label="Torna alla fotocamera">&#8592;</a>
            <h1 id="gallery-title">Galleria</h1>
        </header>

        <div id="gallery-content">
            <!-- Immagine principale -->
            <div id="main-image-container">
                <img id="main-image" class="hidden" alt="Immagine principale">
                <div id="main-placeholder">
                    <span>Tocca per selezionare<br>l'immagine principale</span>
                </div>
            </div>

            <!-- Immagini secondarie -->
            <h2 id="extra-title">Altre immagini</h2>
            <div id="extra-grid"></div>
        </div>

        <!-- Input file nascosti -->
        <input type="file" id="file-input-gallery" accept="image/*" style="display:none">
        <input type="file" id="file-input-camera" accept="image/*" capture="environment" style="display:none">

        <!-- Modale: scelta sorgente immagine -->
        <div id="modal-source" class="modal hidden">
            <div class="modal-source-content">
                <button id="btn-source-gallery" class="btn-source">
                    <span class="btn-source-icon">&#128444;</span>
                    <span>Galleria</span>
                </button>
                <button id="btn-source-camera" class="btn-source">
                    <span class="btn-source-icon">&#128247;</span>
                    <span>Fotocamera</span>
                </button>
                <button id="btn-source-cancel" class="btn-source-cancel">Annulla</button>
            </div>
        </div>

        <!-- Modale: immagine ingrandita -->
        <div id="modal-fullscreen" class="modal hidden">
            <img id="fullscreen-image" alt="Immagine ingrandita">
            <button id="btn-close-fullscreen" aria-label="Chiudi">&#10005;</button>
        </div>
    </div>

    <script src="js/db.js?v=6"></script>
    <script src="js/gallery.js?v=6"></script>
</body>
</html>
