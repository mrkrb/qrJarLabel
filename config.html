<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <title>Configurazione - QR Jar Label</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/config.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header id="header">
            <a href="index.html" id="btn-back" aria-label="Torna alla fotocamera">&#8592;</a>
            <h1>Configurazione</h1>
        </header>

        <!-- Lista associazioni -->
        <div id="list-container">
            <div id="empty-state" class="hidden">
                <p>Nessuna associazione configurata.</p>
                <p>Inquadra un QR code e tocca l'overlay per configurarlo.</p>
            </div>
            <ul id="associations-list"></ul>
            <div id="backup-actions">
                <button id="btn-export" class="btn-backup">&#8595; Esporta backup</button>
                <button id="btn-import" class="btn-backup">&#8593; Importa backup</button>
                <input type="file" id="import-file-input" accept=".zip" style="display:none">
            </div>

            <!-- Impostazioni -->
            <div id="settings-section">
                <h2>Impostazioni</h2>
                <div class="setting-row">
                    <label for="debounce-slider">Debounce overlay</label>
                    <div class="setting-control">
                        <input type="range" id="debounce-slider" min="50" max="500" step="25" value="150">
                        <span id="debounce-value">150ms</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modale: conferma eliminazione -->
        <div id="modal-delete" class="modal hidden">
            <div class="modal-content">
                <h2>Elimina associazione</h2>
                <p>Eliminare l'associazione per <strong id="delete-qr-id"></strong>?</p>
                <div class="modal-actions">
                    <button id="btn-delete-confirm" class="btn-danger">Elimina</button>
                    <button id="btn-delete-cancel" class="btn-secondary">Annulla</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="js/db.js?v=6"></script>
    <script src="js/config.js?v=6"></script>
</body>
</html>
