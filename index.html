<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="description" content="AR Etichette Barattoli - Scansiona QR code sui barattoli per visualizzare etichette in realtà aumentata">
    <title>QR Jar Label</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <div id="camera-container">
            <video id="video" autoplay playsinline muted></video>
            <canvas id="overlay"></canvas>
        </div>
        <div id="status-bar">
            <a href="config.html" id="btn-config" aria-label="Configurazione">&#9881;</a>
            <span id="status-text">Avvio fotocamera...</span>
        </div>
        <div id="scale-control" class="hidden">
            <label for="scale-slider">Scala</label>
            <input type="range" id="scale-slider" min="0.5" max="3" step="0.1" value="1">
            <span id="scale-value">1.0x</span>
        </div>
        <div id="version-badge">v0.7.3</div>
    </div>
    <script src="js/db.js?v=4"></script>
    <script src="js/app.js?v=4"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
</body>
</html>
