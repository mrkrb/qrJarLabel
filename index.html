<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="description" content="AR Etichette Barattoli - Scansiona QR code sui barattoli per visualizzare etichette in realtà aumentata">
    <title>QR Jar Label</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <div id="camera-container">
            <video id="video" autoplay playsinline muted></video>
            <canvas id="overlay"></canvas>
        </div>
        <div id="status-bar">
            <span id="status-text">Avvio fotocamera...</span>
        </div>
        <div id="qr-result" class="hidden">
            <span id="qr-value"></span>
            <button id="btn-upload" class="hidden">Carica immagine</button>
        </div>
        <input type="file" id="file-input" accept="image/*" hidden>
        <div id="version-badge">v0.2.0</div>
    </div>
    <script src="js/db.js"></script>
    <script src="js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
</body>
</html>
